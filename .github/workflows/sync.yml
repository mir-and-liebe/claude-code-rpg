name: Sync Vault

on:
  push:
    paths:
      - "vault-source/**"
  schedule:
    - cron: "0 5 * * *" # Daily at 5:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      - name: Run vault sync
        run: npx tsx scripts/sync-vault.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vault/
          git diff --staged --quiet || git commit -m "chore: sync vault data [automated]"
          git push
